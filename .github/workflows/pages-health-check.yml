name: Check GitHub Pages site

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke-check:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-jammy
      options: --ipc=host
    timeout-minutes: 10
    env:
      REPOSITORY_OWNER: ${{ github.repository_owner }}
      REPOSITORY_NAME: ${{ github.event.repository.name }}
      PAGES_URL_OVERRIDE: ${{ vars.PAGES_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve site URL
        id: site
        run: |
          set -euo pipefail
          site_url="${PAGES_URL_OVERRIDE:-https://${REPOSITORY_OWNER}.github.io/${REPOSITORY_NAME}/}"
          echo "site_url=${site_url}" >> "$GITHUB_OUTPUT"
          echo "Using ${site_url}"

      - name: Install deps
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
        run: npm ci

      - name: Run browser leaderboard smoke check
        env:
          CI: true
          PAGES_HEALTH_CHECK_URL: ${{ steps.site.outputs.site_url }}
          PAGES_HEALTH_CHECK_ROWS: 5
        run: node .github/scripts/pages-health-check.mjs

name: Run tests

on:
  push:
    branches: [ main ]
  pull_request:
    paths:
      - 'js/**'
      - 'tests/**'
      - '.github/workflows/**'

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm ci

      - name: Start static server
        run: |
          mkdir -p artifacts/unit-tests
          npx http-server -p 3000 -c-1 > artifacts/unit-tests/server.log 2>&1 &

      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 10000

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run unit tests
        id: unit_tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/unit-tests
          npm run test 2>&1 | tee artifacts/unit-tests/output.log

      - name: Upload unit test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-tests-log
          path: artifacts/unit-tests
          if-no-files-found: ignore

      - name: Mark unit-tests job as failed
        if: steps.unit_tests.outcome == 'failure'
        run: exit 1

  smoke:
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm ci

      - name: Start static server
        run: |
          mkdir -p artifacts/smoke
          npx http-server -p 3000 -c-1 > artifacts/smoke/server.log 2>&1 &

      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 10000

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run smoke tests (Playwright)
        id: smoke_tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm test 2>&1 | tee artifacts/smoke/output.log
        env:
          CI: true

      - name: Upload smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-log
          path: artifacts/smoke
          if-no-files-found: ignore

      - name: Mark smoke job as failed
        if: steps.smoke_tests.outcome == 'failure'
        run: exit 1

  copilot-auto-fix:
    name: Open Copilot auto-fix issue
    needs:
      - unit-tests
      - smoke
    if: |
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      (needs.unit-tests.result == 'failure' || needs.smoke.result == 'failure')
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      issues: write
      pull-requests: write
    env:
      COPILOT_AGENT_TOKEN: ${{ secrets[format('{0}', 'COPILOT_AGENT_TOKEN')] }}
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      RUN_NUMBER: ${{ github.run_number }}
      WORKFLOW_NAME: ${{ github.workflow }}
      ACTOR: ${{ github.actor }}
      SHA: ${{ github.sha }}
      REF_NAME: ${{ github.ref_name }}
      UNIT_TESTS_RESULT: ${{ needs.unit-tests.result }}
      SMOKE_RESULT: ${{ needs.smoke.result }}
    steps:
      - name: Download failure artifacts
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: '*-log'

      - name: Warn when agent token is missing
        if: env.COPILOT_AGENT_TOKEN == ''
        run: |
          echo "::warning::COPILOT_AGENT_TOKEN is not set. Add a fine-grained PAT or GitHub App user token to enable Copilot auto-fix issue creation."

      - name: Create issue and assign to Copilot
        if: env.COPILOT_AGENT_TOKEN != ''
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets[format('{0}', 'COPILOT_AGENT_TOKEN')] }}
          script: |
            const fs = require('node:fs')
            const path = require('node:path')

            const owner = context.repo.owner
            const repo = context.repo.repo
            const sha = process.env.SHA
            const shortSha = sha.slice(0, 7)
            const refName = process.env.REF_NAME
            const title = `Copilot auto-fix: CI failure on ${refName} @ ${shortSha}`
            const failedJobs = [
              ['unit-tests', process.env.UNIT_TESTS_RESULT],
              ['smoke', process.env.SMOKE_RESULT],
            ]
              .filter(([, result]) => result === 'failure')
              .map(([name]) => name)

            const existing = await github.rest.search.issuesAndPullRequests({
              q: `repo:${owner}/${repo} is:issue is:open in:title "${title.replace(/"/g, '\\"')}"`,
            })

            if (existing.data.items.length > 0) {
              core.notice(`Open auto-fix issue already exists: #${existing.data.items[0].number}`)
              return
            }

            function readTail(filePath, maxLines = 80, maxChars = 6000) {
              if (!fs.existsSync(filePath)) return null

              const content = fs.readFileSync(filePath, 'utf8').trim()
              if (!content) return null

              const tail = content.split(/\r?\n/).slice(-maxLines).join('\n')
              return tail.length > maxChars ? tail.slice(tail.length - maxChars) : tail
            }

            const workspace = process.env.GITHUB_WORKSPACE
            const logSections = [
              ['unit-tests', path.join(workspace, 'artifacts', 'unit-tests-log', 'output.log')],
              ['smoke', path.join(workspace, 'artifacts', 'smoke-log', 'output.log')],
              ['smoke-server', path.join(workspace, 'artifacts', 'smoke-log', 'server.log')],
            ]
              .map(([name, file]) => ({ name, tail: readTail(file) }))
              .filter(({ tail }) => tail)

            const failureDetails = logSections.length === 0
              ? '_No log artifact was available. Use the workflow run link below for full logs._'
              : logSections
                  .map(({ name, tail }) => `### ${name}\n\n\`\`\`text\n${tail}\n\`\`\``)
                  .join('\n\n')

            const issueBody = [
              '## CI failure summary',
              '',
              `A push to \`${refName}\` failed in GitHub Actions and needs investigation.`,
              '',
              `- Workflow: \`${process.env.WORKFLOW_NAME}\``,
              `- Run: [#${process.env.RUN_NUMBER}](${process.env.RUN_URL})`,
              `- Commit: \`${sha}\``,
              `- Triggered by: @${process.env.ACTOR}`,
              `- Failed jobs: ${failedJobs.map((job) => `\`${job}\``).join(', ') || '_unknown_'}`,
              '',
              '## What Copilot should do',
              '',
              '1. Reproduce the failing CI locally or in the agent environment.',
              '2. Make the smallest safe change that restores the workflow.',
              '3. Keep the fix focused on the failure and avoid unrelated refactors.',
              '4. Run the relevant tests before finishing and summarize the root cause in the PR.',
              '',
              'Recommended commands:',
              '',
              '```bash',
              'npm ci',
              'npm run test',
              '```',
              '',
              '## Failure excerpts',
              '',
              failureDetails,
              '',
              `<!-- copilot-auto-fix:${sha} -->`,
            ].join('\n')

            const issue = await github.request('POST /repos/{owner}/{repo}/issues', {
              owner,
              repo,
              title,
              body: issueBody,
              assignees: ['copilot-swe-agent[bot]'],
              agent_assignment: {
                target_repo: `${owner}/${repo}`,
                base_branch: refName,
                custom_instructions: [
                  'This issue was created automatically from a failed CI run.',
                  'Investigate the failing jobs and open a pull request with the smallest safe fix.',
                  'Stay within the JavaScript web game unless the failure clearly requires changes elsewhere.',
                  'Run the relevant tests before finishing.',
                ].join(' '),
              },
              headers: {
                accept: 'application/vnd.github+json',
                'X-GitHub-Api-Version': '2022-11-28',
              },
            })

            core.notice(`Created Copilot auto-fix issue #${issue.data.number}`)
